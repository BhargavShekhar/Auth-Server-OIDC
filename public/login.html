<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign in</title>
        <style>
            :root {
                color-scheme: light;
                --bg: #fafafa;
                --card: #ffffff;
                --text: #111827;
                --muted: #6b7280;
                --border: #e5e7eb;
                --ring: #111827;
            }

            * { box-sizing: border-box; }

            body {
                margin: 0;
                font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 16px;
            }

            .card {
                width: 100%;
                max-width: 380px;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 28px;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
            }

            h1 {
                margin: 0 0 6px;
                font-size: 1.35rem;
                font-weight: 600;
            }

            .sub {
                margin: 0 0 18px;
                color: var(--muted);
                font-size: 0.92rem;
            }

            .field { margin-bottom: 10px; }

            input {
                width: 100%;
                height: 42px;
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 0 12px;
                font-size: 0.94rem;
                outline: none;
            }

            input:focus {
                border-color: var(--ring);
                box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.12);
            }

            button {
                width: 100%;
                height: 42px;
                border: 1px solid #111827;
                border-radius: 10px;
                background: #111827;
                color: #fff;
                font-size: 0.94rem;
                font-weight: 500;
                cursor: pointer;
            }

            button:hover { opacity: 0.95; }

            .footer {
                margin-top: 12px;
                font-size: 0.79rem;
                color: var(--muted);
                text-align: center;
            }
        </style>
    </head>
    <body>
        <main class="card">
            <h1>Sign in</h1>
            <p class="sub">Continue to authorize this application.</p>

            <form method="POST" action="/authorize">
                <input type="hidden" name="client_id" value="__CLIENT_ID__" />
                <input type="hidden" name="redirect_uri" value="__REDIRECT_URI__" />
                <input type="hidden" name="state" value="__STATE__" />
                <input type="hidden" name="code_challenge" value="__code_challenge__" />

                <div class="field">
                    <input type="email" name="email" placeholder="Email" autocomplete="email" required />
                </div>
                <div class="field">
                    <input type="password" name="password" placeholder="Password" autocomplete="current-password" required />
                </div>

                <button type="submit">Continue</button>
            </form>

            <p class="footer">Secure sign-in powered by OIDC</p>
        </main>
    </body>
</html>
